name: Deploy Vite site to Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write

# Node 24 강제 적용 옵션 추가 (경고 해결)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 최신 버전으로 상향
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # 🚀 [추가] 127 에러 및 Permission denied의 종지부를 찍을 권한 부여
      - name: Give execution permission to all binaries
        run: chmod -R +x node_modules/.bin/

      - name: Build project
        run: npm run build -- --base /handle/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
