name: Deploy Vite site to Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write

# Node 24 강제 적용 옵션 추가 (경고 해결)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 최신 버전으로 상향
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # 🚀 핵심: 'npm run build'를 쓰지 않고 직접 실행
      # 127 에러(Command not found)의 주범인 rimraf를 완전히 우회합니다.
      - name: Build project
        run: npx vite build src --base /handle/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # vite.config.js에서 outDir을 ../dist로 설정했으므로 
          # 프로젝트 루트 기준 './dist' 폴더를 배포합니다.
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
