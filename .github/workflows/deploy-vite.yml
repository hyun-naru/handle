name: Deploy Vite site to Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # ✅ 핵심 수정 부분: 
      # npm run build를 호출하면 rimraf 때문에 127 에러가 납니다.
      # 대신 npx를 사용하여 vite 빌드를 직접 수행합니다.
      # 현재 root가 'src'로 설정되어 있으므로 경로를 명시합니다.
      - name: Build project
        run: npx vite build src --base /handle/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # vite.config.js에서 outDir을 ../dist로 잡았으므로 
          # 루트 기준 ./dist 폴더가 배포 대상입니다.
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
