name: Deploy Vite site to Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      # 1. 의존성 설치 (rimraf를 포함한 모든 도구 설치)
      - run: npm install
      # npx vite build 뒤에 root 경로인 src를 명시하거나, 
      # 설정을 읽도록 강제합니

      # 2. 핵심: npm run build 대신 '직접' vite build 실행
      # 이렇게 하면 rimraf 에러를 건너뛰고 바로 빌드할 수 있습니다.
      - run: npx vite build src --base /handle/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - uses: actions/deploy-pages@v4
